baseURL: "https://kleym.sonda.red/"
title: "kleym"
languageCode: "en"
defaultContentLanguage: "en"

enableRobotsTXT: true
enableGitInfo: true

pagination:
  pagerSize: 20

contentDir: docs
assetDir: docs/assets
staticDir:
  - docs/static
  - docs/assets

module:
  workspace: docs/hugo.work
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: swapoff

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Projects
      identifier: projects
      url: /projects/
      weight: 2
    - name: Notes
      url: "https://sonda.red/notes/"
      weight: 3
    - name: About
      url: "https://sonda.red/about/"
      weight: 4
    - name: kleym
      parent: projects
      pageRef: /
      weight: 1
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/sonda-red/kleym"
      params:
        icon: github
    - name: LinkedIn
      weight: 7
      url: "https://linkedin.com/in/daskalovk"
      params:
        icon: linkedin

  sidebar:
    - name: More
      params:
        type: separator
      weight: 1
    - name: Releases (GitHub)
      url: "https://github.com/sonda-red/kleym/releases"
      weight: 2

params:
  description: "Kubernetes operator that compiles inference identity intent into deterministic SPIFFE identities."
  keywords: "kubernetes,platform engineering,workload identity,spiffe,spire,mlops,inference,operators,gateway api inference extension"

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/sondrd-64.png
      link: /
      width: 28
      height: 28
    width: wide

  theme:
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: wide

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  editURL:
    enable: true
    base: "https://github.com/sonda-red/kleym/edit/main/docs"

  page:
    width: wide

  toc:
    displayTags: true

  imageZoom:
    enable: true

  highlight:
    copy:
      enable: true
      display: hover
