# Externally owned GAIE reference input. kleym resolves the pool directly, but
# it does not create, modify, or manage the resource.
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: reference-pool
  namespace: kleym-reference-inference
  labels:
    app.kubernetes.io/name: reference-pool
    app.kubernetes.io/part-of: kleym-reference-inference
    kleym.sonda.red/reference: inference-environment
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: reference-model-server
      app.kubernetes.io/part-of: kleym-reference-inference
  targetPorts:
    - number: 8000
