# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: binding-reconciliation
spec:
  description: Verifies that reference PerObjective and PoolOnly bindings reconcile to stable managed ClusterSPIFFEIDs.
  timeouts:
    apply: 30s
    assert: 2m
    cleanup: 45s
    delete: 30s
    exec: 4m
  steps:
    - name: verify-manager-metrics
      try:
        - script:
            content: |
              set -eu

              cleanup() {
                kubectl delete pod kleym-metrics-smoke -n kleym-system --ignore-not-found=true
                kubectl delete clusterrolebinding kleym-metrics-smoke --ignore-not-found=true
              }
              trap cleanup EXIT

              cleanup
              kubectl apply -f - <<'EOF'
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRoleBinding
              metadata:
                name: kleym-metrics-smoke
              roleRef:
                apiGroup: rbac.authorization.k8s.io
                kind: ClusterRole
                name: kleym-metrics-reader
              subjects:
                - kind: ServiceAccount
                  name: kleym-operator
                  namespace: kleym-system
              EOF

              service_ip="$(kubectl get service kleym-operator-metrics-service -n kleym-system -o jsonpath='{.spec.clusterIP}')"
              for _ in $(seq 1 60); do
                endpoint_ip="$(kubectl get endpoints kleym-operator-metrics-service -n kleym-system -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)"
                if [ -n "${endpoint_ip}" ]; then
                  break
                fi
                sleep 1
              done
              test -n "${endpoint_ip}"
              kubectl apply -f - <<EOF
              apiVersion: v1
              kind: Pod
              metadata:
                name: kleym-metrics-smoke
                namespace: kleym-system
              spec:
                restartPolicy: Never
                serviceAccountName: kleym-operator
                containers:
                  - name: curl
                    image: curlimages/curl:latest
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        metrics="\$(curl -fsSk \
                          -H "Authorization: Bearer \$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                          https://${service_ip}:8443/metrics)" && test -n "\${metrics}"
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                      runAsUser: 1000
                      seccompProfile:
                        type: RuntimeDefault
              EOF
              for _ in $(seq 1 120); do
                phase="$(kubectl get pod kleym-metrics-smoke -n kleym-system -o jsonpath='{.status.phase}')"
                if [ "${phase}" = "Succeeded" ]; then
                  exit 0
                fi
                if [ "${phase}" = "Failed" ]; then
                  kubectl logs kleym-metrics-smoke -n kleym-system || true
                  exit 1
                fi
                sleep 1
              done
              kubectl describe pod kleym-metrics-smoke -n kleym-system || true
              exit 1

    - name: apply-reference-environment
      try:
        - script:
            workDir: ../../..
            content: |
              kubectl apply -k test/reference/inference-environment
              kubectl rollout status deployment/reference-model-server \
                -n kleym-reference-inference \
                --timeout=120s

    - name: apply-binding
      try:
        - apply:
            file: binding.yaml
        - assert:
            file: binding-ready.yaml
        - assert:
            file: clusterspiffeid.yaml

    - name: inspect-binding-json
      try:
        - script:
            workDir: ../../..
            content: |
              set -eu

              report="$(mktemp)"
              bin/kleym inspect binding binding \
                -n kleym-reference-inference \
                -o json > "${report}"
              go run ./test/e2e/inspectbindingassert "${report}" success

    - name: inspect-missing-binding-json
      try:
        - script:
            workDir: ../../..
            content: |
              set -eu

              report="$(mktemp)"
              set +e
              bin/kleym inspect binding missing-binding \
                -n kleym-reference-inference \
                -o json > "${report}"
              status="$?"
              set -e
              if [ "${status}" -ne 3 ]; then
                echo "expected exit code 3 for missing binding, got ${status}" >&2
                exit 1
              fi
              go run ./test/e2e/inspectbindingassert "${report}" not-found

    - name: reapply-binding
      try:
        - apply:
            file: binding.yaml
        - assert:
            file: binding-ready.yaml
        - assert:
            file: clusterspiffeid.yaml

    - name: delete-binding
      try:
        - delete:
            file: binding.yaml
        - script:
            content: |
              kubectl wait --for=delete inferenceidentitybinding/binding \
                -n kleym-reference-inference \
                --timeout=60s
              kubectl wait --for=delete clusterspiffeid/kleym-kleym-reference-inference-binding-objective-3b2d9110 \
                --timeout=60s

    - name: apply-pool-binding
      try:
        - apply:
            file: pool-binding.yaml
        - assert:
            file: pool-binding-ready.yaml
        - assert:
            file: pool-clusterspiffeid.yaml

    - name: reapply-pool-binding
      try:
        - apply:
            file: pool-binding.yaml
        - assert:
            file: pool-binding-ready.yaml
        - assert:
            file: pool-clusterspiffeid.yaml

    - name: delete-pool-binding
      try:
        - delete:
            file: pool-binding.yaml
        - script:
            content: |
              kubectl wait --for=delete inferenceidentitybinding/pool-binding \
                -n kleym-reference-inference \
                --timeout=60s
              kubectl wait --for=delete clusterspiffeid/kleym-kleym-reference-inference-pool-binding-pool-e2d8bd8d \
                --timeout=60s
        - script:
            workDir: ../../..
            content: kubectl delete -k test/reference/inference-environment --ignore-not-found=true
