version: "2"

run:
  allow-parallel-runners: true

linters:
  default: none

  enable:
    # Correctness
    - copyloopvar
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - nilerr
    - staticcheck
    - unconvert
    - unused

    # Project specific tests
    - ginkgolinter

    # Low noise hygiene
    - gocyclo
    - misspell
    - nolintlint
    - revive

  settings:
    gocyclo:
      min-complexity: 30

    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing

  exclusions:
    generated: lax

    presets:
      - common-false-positives
      - std-error-handling

    rules:
      # Test fixtures intentionally repeat Kubernetes object keys, names,
      # selector strings, and expected condition values.
      - path: '(.+)_test\.go'
        linters:
          - gocyclo

    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports

  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$