---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - inference.networking.k8s.io
  - inference.networking.x-k8s.io
  resources:
  - inferenceobjectives
  - inferencepools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kleym.sonda.red
  resources:
  - inferenceidentitybindings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kleym.sonda.red
  resources:
  - inferenceidentitybindings/finalizers
  verbs:
  - update
- apiGroups:
  - kleym.sonda.red
  resources:
  - inferenceidentitybindings/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - spire.spiffe.io
  resources:
  - clusterspiffeids
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
