# This rule is not used by the project kleym itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to kleym.sonda.red resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kleym
    app.kubernetes.io/managed-by: kustomize
  name: inferenceidentitybinding-viewer-role
rules:
- apiGroups:
  - kleym.sonda.red
  resources:
  - inferenceidentitybindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kleym.sonda.red
  resources:
  - inferenceidentitybindings/status
  verbs:
  - get
