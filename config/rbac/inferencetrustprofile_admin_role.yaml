# This rule is not used by the project terence itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over terence.sonda.red.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: terence
    app.kubernetes.io/managed-by: kustomize
  name: inferencetrustprofile-admin-role
rules:
- apiGroups:
  - terence.sonda.red
  resources:
  - inferencetrustprofiles
  verbs:
  - '*'
- apiGroups:
  - terence.sonda.red
  resources:
  - inferencetrustprofiles/status
  verbs:
  - get
