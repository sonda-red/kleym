# This rule is not used by the project terence itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to terence.sonda.red.sonda.red resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: terence
    app.kubernetes.io/managed-by: kustomize
  name: inferencetrustprofile-viewer-role
rules:
- apiGroups:
  - terence.sonda.red.sonda.red
  resources:
  - inferencetrustprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - terence.sonda.red.sonda.red
  resources:
  - inferencetrustprofiles/status
  verbs:
  - get
