name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: Run on arc-nuc-set
    runs-on: arc-nuc-set
    container:
      image: golang:1.23
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
