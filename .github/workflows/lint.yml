name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Run on arc-set-nuc
    runs-on: arc-set-nuc
    container:
      image: golang:1.25
    env:
      GOFLAGS: -buildvcs=false -p=2
      GOMAXPROCS: "2"
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      GOLANGCI_LINT_CACHE: /root/.cache/golangci-lint
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          skip-cache: true
          args: ./...
