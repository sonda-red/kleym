name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: Run on arc-set-nuc
    runs-on: arc-set-nuc
    container:
      image: golang:1.25
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
