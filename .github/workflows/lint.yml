name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Run on arc-set-nuc
    runs-on: arc-set-nuc
    container:
      image: golang:1.25
    env:
      GOFLAGS: -buildvcs=false
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          skip-cache: false
          skip-pkg-cache: false
          skip-build-cache: false
