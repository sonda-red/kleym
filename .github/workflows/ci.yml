name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -buildvcs=false -p=2
      GOMAXPROCS: "2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          skip-cache: true
          args: ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -buildvcs=false -p=2
      GOMAXPROCS: "2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests
        run: make test
