name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -buildvcs=false -p=2
      GOMAXPROCS: "2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          skip-cache: true
          args: ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -buildvcs=false -p=2
      GOMAXPROCS: "2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests
        run: make test

  build:
    name: Build and Push Container Image
    needs:
      - lint
      - test
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      BUILD_PLATFORMS: ${{ (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get version tag
        id: version
        run: |
          # For tag pushes, extract tag from ref
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
            echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "Building version: ${TAG_NAME}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, use commit SHA
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=pr-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "Building PR version: pr-${SHORT_SHA}"
          else
            # Fallback for manual dispatch
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
            echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "Building version: ${LATEST_TAG}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/kleym
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=dev,enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image (PR, cache read-only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=kleym-buildkit
          platforms: ${{ env.BUILD_PLATFORMS }}

      - name: Build and push Docker image (tag/manual, refresh cache)
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=kleym-buildkit
          cache-to: type=gha,mode=min,scope=kleym-buildkit,ignore-error=true
          platforms: ${{ env.BUILD_PLATFORMS }}

      - name: Output image tags
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: |
          echo "## Docker Image Published 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ghcr.io/${{ github.repository_owner }}/kleym" >> $GITHUB_STEP_SUMMARY
          echo "**Version Tag**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ steps.version.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository_owner }}/kleym:${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Output PR image info
        if: github.event_name == 'pull_request'
        run: |
          echo "## Docker Image Published 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ghcr.io/${{ github.repository_owner }}/kleym" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**: dev, ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ steps.version.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull commands:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Latest dev build:" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository_owner }}/kleym:dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Specific commit SHA:" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository_owner }}/kleym:${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
