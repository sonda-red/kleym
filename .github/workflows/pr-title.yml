name: PR Title

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read

jobs:
  lint:
    name: Validate Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            revert
            docs
            style
            test
            build
            ci
            chore
          scopes: |
            api
            controller
            config
            deps
          requireScope: false
          subjectPattern: ^[a-z].+$
          subjectPatternError: >
            The subject must start with a lowercase letter.
            Example: "docs: migrate from MkDocs to Hugo"
