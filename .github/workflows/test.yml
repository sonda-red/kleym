name: Tests

on:
  push: 
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run on arc-set-nuc
    runs-on: arc-set-nuc
    container:
      image: golang:1.25
    env:
      GOFLAGS: -buildvcs=false
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Cache Go build, modules, tools, and envtest
        uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
            bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-tools-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-

      - name: Running Tests
        run: |
          go mod download
          make test
