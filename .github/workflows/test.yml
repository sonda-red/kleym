name: Tests

on:
  push: 
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run on arc-set-nuc
    runs-on: arc-set-nuc
    container:
      image: golang:1.25
      options: --privileged
    env:
      GOFLAGS: -buildvcs=false
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Running Tests
        run: make test
