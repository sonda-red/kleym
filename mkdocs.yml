site_name: kleym
site_url: https://kleym.sonda.red
repo_url: https://github.com/sonda-red/kleym
repo_name: sonda-red/kleym
strict: true

theme:
  name: material
  logo: assets/images/favicon.png
  favicon: assets/images/favicon.png
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.superfences
  - pymdownx.details

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Spec: spec.md
  - Roadmap: roadmap.md
  - Install: install.md
  - Reference:
      - API: reference/api.md
      - Conditions: reference/conditions.md
      - Resources: reference/resources.md
  - Design:
      - Reconciliation: design/reconciliation.md
      - Selector Safety: design/selector-safety.md
      - Collision Detection: design/collision-detection.md
  - Examples:
      - Basic Binding: examples/basic-binding.md
      - PerObjective: examples/per-objective.md
  - Contributing: contributing.md
